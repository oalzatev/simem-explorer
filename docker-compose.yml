services:
  simem-explorer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simem-explorer
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - SIMEM_EXPORT_PATH=/app/exports
    volumes:
      # Persistir base de datos SQLite entre reinicios
      - simem_data:/app/data
      # Carpeta de exports mapeada a tu disco local
      - ./exports:/app/exports
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  simem_data:
    driver: local
